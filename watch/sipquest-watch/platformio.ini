[platformio]
core_dir = ../.platformio

[env:t-watch-2020-v1]
platform = espressif32
board = ttgo-t-watch
framework = arduino

upload_port = /dev/cu.usbserial-022157BE
monitor_port = /dev/cu.usbserial-022157BE
monitor_speed = 115200
upload_speed = 460800

lib_extra_dirs = ../TTGO_TWatch_Library
lib_ldf_mode = deep+
lib_deps =
    earlephilhower/ESP8266Audio@^1.9.9
    bblanchon/ArduinoJson@^6.21.5

build_flags =
    -DLILYGO_WATCH_2020_V1
    -DCORE_DEBUG_LEVEL=0
